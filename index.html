<!DOCTYPE html>
<html lang="en">
<head>
    <title>Slope</title>
    <link rel="icon" href="slope.png">
    <link rel="stylesheet" href="TemplateData/style.css">

    <!-- Unity -->
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="TemplateData/unityloader41.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/slope.json",
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    }
                }
            }
        );
    </script>

    <style>
        /* Global */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: "Consolas", "Courier New", monospace;
        }

        /* TERMINAL NEON LOCKSCREEN */
        #lockscreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            text-align: center;
        }

        #lockscreen h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow:
                0 0 5px #ffffff,
                0 0 10px #00ffff,
                0 0 20px #00ffff;
            letter-spacing: 0.15em;
        }

        #lockscreen p.subtitle {
            font-size: 14px;
            color: #00ffff;
            margin-bottom: 25px;
            text-shadow:
                0 0 6px #00ffff,
                0 0 12px #00ffff;
        }

        #accessInput {
            padding: 12px 18px;
            font-size: 20px;
            border-radius: 4px;
            border: 1px solid #00ffff;
            outline: none;
            text-align: center;
            width: 260px;
            background: #000;
            color: #00ffff;
            box-shadow:
                0 0 6px #00ffff,
                0 0 12px #00ffff55;
        }

        #accessInput::placeholder {
            color: #008b8b;
        }

        #unlockButton {
            margin-top: 18px;
            padding: 10px 26px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #00ffff;
            border-radius: 4px;
            background: #000;
            color: #00ffff;
            letter-spacing: 0.15em;
            text-shadow:
                0 0 6px #00ffff,
                0 0 12px #00ffff;
            transition: 0.2s;
        }

        #unlockButton:hover {
            background: #00ffff;
            color: #000;
            transform: translateY(-1px);
        }

        #error {
            color: #ff4d4d;
            margin-top: 12px;
            display: none;
            font-size: 14px;
            text-shadow:
                0 0 6px #ff0000,
                0 0 12px #ff0000;
        }

        /* Fade out animation */
        #lockscreen.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Watermark */
        #watermark {
            position: fixed;
            right: 12px;
            bottom: 8px;
            font-size: 12px;
            color: #ffffff;
            opacity: 0.18;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow:
                0 0 4px #ffffff,
                0 0 8px #00ffff;
        }
    </style>
</head>

<body>

    <!-- 🎵 CUSTOM MUSIC -->
    <audio id="customMusic" src="739991_Creo---Sphere.mp3" autoplay loop></audio>

    <!-- 🔒 TERMINAL NEON LOCKSCREEN -->
    <div id="lockscreen">
        <h2>ACCESS REQUIRED</h2>
        <p class="subtitle">ENTER ACCESS CODE TO CONTINUE</p>
        <input id="accessInput" type="password" placeholder="ENTER CODE">
        <button id="unlockButton" onclick="checkAccess()">UNLOCK</button>
        <p id="error">ACCESS DENIED</p>
    </div>

    <!-- watermark -->
    <div id="watermark">made by adam s</div>

    <script>
        const ACCESS_CODE = "XCFE83";

        function checkAccess() {
            const input = document.getElementById("accessInput").value;

            if (input === ACCESS_CODE) {
                const lock = document.getElementById("lockscreen");
                lock.classList.add("fade-out");
                setTimeout(() => {
                    lock.style.display = "none";
                }, 400);
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // Enter key unlock
        document.getElementById("accessInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                checkAccess();
            }
        });

        // Mute Unity audio
        document.addEventListener("DOMContentLoaded", () => {
            try { Howler.mute(true); } catch(e) {}
        });
    </script>

    <!-- Unity container -->
    <div class="webgl-content">
        <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
    </div>

</body>
</html>
