<!DOCTYPE html>
<html lang="en">
<head>
    <title>Slope</title>
    <link rel="icon" href="slope.png">
    <link rel="stylesheet" href="TemplateData/style.css">

    <!-- Unity -->
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="TemplateData/unityloader41.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/slope.json",
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    }
                }
            }
        );
    </script>

    <style>
        /* Global */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: "Consolas", "Courier New", monospace;
        }

        /* TERMINAL-STYLE LOCKSCREEN (TOP RIGHT) */
        #lockscreen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
            pointer-events: auto;
        }

        #lockscreen-inner {
            position: absolute;
            top: 24px;
            right: 24px;
            text-align: right;
        }

        #lockscreen-label {
            font-size: 14px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            text-shadow:
                0 0 4px #ffffff,
                0 0 8px #ffffff,
                0 0 12px #00ffff;
        }

        #lockscreen-sub {
            margin-top: 4px;
            font-size: 11px;
            color: #aaaaaa;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #accessInput {
            margin-top: 10px;
            font-size: 16px;
            padding: 4px 0;
            width: 220px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ffffff;
            color: #ffffff;
            outline: none;
            text-align: right;
            text-shadow:
                0 0 4px #ffffff,
                0 0 8px #00ffff;
        }

        #accessInput::placeholder {
            color: #555;
        }

        #error {
            margin-top: 6px;
            font-size: 11px;
            color: #ff4d4d;
            text-shadow:
                0 0 4px #ff0000,
                0 0 8px #ff0000;
            display: none;
        }

        /* Fade out animation */
        #lockscreen.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Watermark */
        #watermark {
            position: fixed;
            right: 12px;
            bottom: 8px;
            font-size: 12px;
            color: #ffffff;
            opacity: 0.2;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow:
                0 0 4px #ffffff,
                0 0 8px #00ffff;
        }
    </style>
</head>

<body>

    <!-- 🎵 CUSTOM MUSIC -->
    <audio id="customMusic" src="739991_Creo---Sphere.mp3" autoplay loop></audio>

    <!-- 🔒 TERMINAL-STYLE LOCKSCREEN -->
    <div id="lockscreen">
        <div id="lockscreen-inner">
            <div id="lockscreen-label">ENTER ACCESS CODE</div>
            <div id="lockscreen-sub">AUTH REQUIRED</div>
            <input id="accessInput" type="password" placeholder="••••••">
            <div id="error">ACCESS DENIED</div>
        </div>
    </div>

    <!-- watermark -->
    <div id="watermark">made by adam s</div>

    <script>
        const ACCESS_CODE = "XCFE83";

        function checkAccess() {
            const input = document.getElementById("accessInput").value;

            if (input === ACCESS_CODE) {
                const lock = document.getElementById("lockscreen");
                lock.classList.add("fade-out");
                setTimeout(() => {
                    lock.style.display = "none";
                }, 400);
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // Enter key unlock
        document.getElementById("accessInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                checkAccess();
            }
        });

        // Mute Unity audio
        document.addEventListener("DOMContentLoaded", () => {
            try { Howler.mute(true); } catch(e) {}
        });
    </script>

    <!-- Unity container -->
    <div class="webgl-content">
        <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
    </div>

</body>
</html>
