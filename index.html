<!DOCTYPE html>
<html lang="en">
<head>
    <title>Slope</title>
    <link rel="icon" href="slope.png">
    <link rel="stylesheet" href="TemplateData/style.css">

    <!-- Unity -->
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="TemplateData/unityloader41.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/slope.json",
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    }
                }
            }
        );
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: "Consolas", "Courier New", monospace;
        }

        /* Terminal-style lockscreen */
        #lockscreen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
        }

        #lockscreen-inner {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
        }

        #prompt {
            font-size: 14px;
            display: inline-block;
        }

        #cursor {
            display: inline-block;
            width: 8px;
            background: #fff;
            margin-left: 4px;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #typed {
            font-size: 14px;
            margin-top: 6px;
            white-space: pre;
        }

        #error {
            margin-top: 6px;
            font-size: 12px;
            color: #ff4d4d;
            display: none;
        }

        #lockscreen.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Watermark */
        #watermark {
            position: fixed;
            right: 12px;
            bottom: 8px;
            font-size: 12px;
            color: #fff;
            opacity: 0.4;
            font-family: "Consolas", monospace;
        }
    </style>
</head>

<body>

    <!-- 🎵 Custom Music -->
    <audio id="customMusic" src="739991_Creo---Sphere.mp3" loop></audio>

    <!-- Terminal lockscreen -->
    <div id="lockscreen">
        <div id="lockscreen-inner">
            <div id="prompt">Enter Access Code:<div id="cursor">&nbsp;</div></div>
            <div id="typed"></div>
            <div id="error">ACCESS DENIED</div>
        </div>

        <div id="watermark">made by adam s</div>
    </div>

    <script>
        const ACCESS_CODE = "XCFE83";
        let buffer = "";

        // Capture all keypresses globally
        document.addEventListener("keydown", function(e) {
            if (!document.getElementById("lockscreen")) return;

            if (e.key === "Enter") {
                if (buffer === ACCESS_CODE) {
                    unlock();
                } else {
                    document.getElementById("error").style.display = "block";
                    buffer = "";
                    document.getElementById("typed").textContent = "";
                }
                return;
            }

            if (e.key === "Backspace") {
                buffer = buffer.slice(0, -1);
                document.getElementById("typed").textContent = buffer.replace(/./g, "•");
                return;
            }

            if (e.key.length === 1) {
                buffer += e.key;
                document.getElementById("typed").textContent = buffer.replace(/./g, "•");
            }
        });

        function unlock() {
            const lock = document.getElementById("lockscreen");
            lock.classList.add("fade-out");
            setTimeout(() => {
                lock.remove();
            }, 400);

            // mute Unity audio
            try { Howler.mute(true); } catch(e) {}

            // play custom music
            const music = document.getElementById("customMusic");
            music.volume = 0.5;
            music.play().catch(err => console.log("Autoplay blocked:", err));
        }
    </script>

    <!-- Unity container -->
    <div class="webgl-content">
        <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
    </div>

</body>
</html>
