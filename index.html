<!DOCTYPE html>
<html lang="en">
<head>
    <title>Slope</title>
    <link rel="icon" href="slope.png">
    <link rel="stylesheet" href="TemplateData/style.css">

    <!-- Unity -->
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="TemplateData/unityloader41.js"></script>

    <script>
        var gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "Build/slope.json",
            {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function () {
                        UnityProgress(gameInstance, "complete");
                    }
                }
            }
        );
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: "Consolas", "Courier New", monospace;
        }

        /* Terminal-style lockscreen */
        #lockscreen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
        }

        #lockscreen-inner {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
        }

        #lockscreen-label {
            font-size: 14px;
            color: #fff;
            display: inline-block;
        }

        /* Blinking cursor */
        #cursor {
            display: inline-block;
            width: 8px;
            background: #fff;
            margin-left: 4px;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #accessInput {
            margin-top: 6px;
            font-size: 14px;
            width: 220px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #fff;
            color: #fff;
            outline: none;
            text-align: left;
        }

        #accessInput::placeholder {
            color: #555;
        }

        #error {
            margin-top: 6px;
            font-size: 12px;
            color: #ff4d4d;
            display: none;
        }

        #lockscreen.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Watermark */
        #watermark {
            position: fixed;
            right: 12px;
            bottom: 8px;
            font-size: 12px;
            color: #fff;
            opacity: 0.4;
            font-family: "Consolas", monospace;
        }
    </style>
</head>

<body>

    <!-- 🎵 Custom Music -->
    <audio id="customMusic" src="739991_Creo---Sphere.mp3" loop></audio>

    <!-- Terminal lockscreen -->
    <div id="lockscreen">
        <div id="lockscreen-inner">
            <div id="lockscreen-label">Enter Access Code:<div id="cursor">&nbsp;</div></div>
            <br>
            <input id="accessInput" type="password" placeholder="••••••">
            <div id="error">ACCESS DENIED</div>
        </div>
    </div>

    <!-- watermark -->
    <div id="watermark">made by adam s</div>

    <script>
        const ACCESS_CODE = "XCFE83";

        function checkAccess() {
            const input = document.getElementById("accessInput").value;

            if (input === ACCESS_CODE) {
                const lock = document.getElementById("lockscreen");
                lock.classList.add("fade-out");
                setTimeout(() => {
                    lock.style.display = "none";
                }, 400);

                // mute Unity audio
                try { Howler.mute(true); } catch(e) {}

                // play custom music
                const music = document.getElementById("customMusic");
                music.volume = 0.5;
                music.play().catch(err => console.log("Autoplay blocked:", err));
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // Enter key unlock
        document.getElementById("accessInput").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                checkAccess();
            }
        });
    </script>

    <!-- Unity container -->
    <div class="webgl-content">
        <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
    </div>

</body>
</html>
